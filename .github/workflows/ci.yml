name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: "1.26"
  DOTNET_VERSION: "8.0.x"

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: gofmt
        run: |
          fmtout=$(gofmt -l internal/ cmd/)
          if [ -n "$fmtout" ]; then
            echo "These files are not gofmt-clean:"; echo "$fmtout"; exit 1
          fi
      - name: go vet
        run: go vet ./internal/... ./cmd/...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.1.6

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: go build
        run: go build ./...
      - name: go test (unit)
        run: go test ./internal/...

  conformance:
    name: Conformance (go vs goclr on .NET)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Build .NET runtime + stdlib
        run: |
          dotnet build runtime/dotnet/GoCLR.Runtime.csproj -c Release
          dotnet build runtime/stdlib/GoCLR.Stdlib.csproj -c Release
      - name: Run conformance suite
        env:
          GOCLR_RUNTIME_DLL: ${{ github.workspace }}/runtime/dotnet/bin/Release/net8.0/GoCLR.Runtime.dll
          GOCLR_STDLIB_DLL: ${{ github.workspace }}/runtime/stdlib/bin/Release/net8.0/GoCLR.Stdlib.dll
        run: go test -count=1 ./tests/conformance/
